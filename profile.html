<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Profile - Best Pen Agency</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-shell" id="app-shell" style="display:none;">
  <div class="app-topbar" id="app-topbar-root"></div>
  <main class="app-main">
    <h1 class="page-title">My Profile</h1>
    <p class="page-sub">Your account details.</p>

    <div class="profile-card">
      <div class="profile-avatar-row">
        <div class="profile-avatar" id="profile-avatar">—</div>
      </div>

      <div class="profile-field">
        <span class="label">Username</span>
        <span class="value" id="profile-username">—</span>
      </div>
      <div class="profile-field">
        <span class="label">Full Name</span>
        <span class="value" id="profile-fullname">—</span>
      </div>
      <div class="profile-field">
        <span class="label">Gender</span>
        <span class="value" id="profile-gender">—</span>
      </div>
      <div class="profile-field">
        <span class="label">Date of Birth</span>
        <span class="value" id="profile-dob">—</span>
      </div>
      <div class="profile-field">
        <span class="label">Address</span>
        <span class="value" id="profile-address">—</span>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
<script>
  initGatedPage("settings", (user, profile) => {
    const avatarEl = document.getElementById("profile-avatar");
    if (profile.avatar_url) {
      avatarEl.innerHTML = `<img src="${profile.avatar_url}" alt="">`;
    } else {
      avatarEl.textContent = (profile.username || profile.name || "?").trim().charAt(0).toUpperCase();
    }

    document.getElementById("profile-username").textContent = profile.username || "—";
    document.getElementById("profile-fullname").textContent = profile.name || "—";
    document.getElementById("profile-gender").textContent = profile.gender
      ? (profile.gender === "female" ? "Female" : "Male")
      : "—";
    document.getElementById("profile-dob").textContent = profile.date_of_birth || "—";
    document.getElementById("profile-address").textContent = profile.address || "—";
  });
</script>

</body>
</html>
